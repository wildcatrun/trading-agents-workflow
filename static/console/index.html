<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trading Agents Workflow Console</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Workflow Console</h1>
        <p id="configLine">Loading...</p>
      </div>
      <form id="globalSearchForm" class="global-search" role="search">
        <input id="globalSearchInput" type="search" autocomplete="off" spellcheck="false" placeholder="Search workflow, dispatch, agent, artifact..." />
        <button type="submit">Search</button>
        <button id="commandPaletteButton" type="button">Jump</button>
      </form>
      <nav class="view-tabs" aria-label="Workflow views">
        <button data-console-view="command-center">Command</button>
        <button data-console-view="activity">Activity</button>
        <button data-console-view="agent-board">Agents</button>
        <button data-console-view="kanban">Kanban</button>
        <button data-console-view="evidence-workspace">Evidence</button>
        <button data-console-view="operations">Operations</button>
        <button data-console-view="workflows">Workflows</button>
        <button data-view="active">Active</button>
        <button data-view="waiting_human">Human Gate</button>
        <button data-view="blocked">Blocked</button>
        <button data-view="paused">Paused</button>
        <button data-view="updated_24h">24h</button>
      </nav>
    </header>
    <main class="layout">
      <section class="panel workflows" aria-label="Workflow queue">
        <div class="panel-head">
          <div>
            <h2>Workflows</h2>
            <p id="workflowCount" class="muted">0 loaded</p>
          </div>
          <button id="refreshButton">Refresh</button>
        </div>
        <div id="metrics" class="metrics"></div>
        <div id="workflowList" class="list" role="list"></div>
      </section>
      <section class="panel detail" aria-label="Workflow detail">
        <div class="panel-head">
          <div>
            <h2 id="detailTitle">Select a workflow</h2>
            <p id="detailSubtitle" class="muted">No workflow selected.</p>
          </div>
          <div class="actions">
            <span id="actionStatus" class="action-status"></span>
            <button id="previewButton" disabled>Preview Supervise</button>
          </div>
        </div>
        <div id="detailSummary" class="summary-strip"></div>
        <div class="tabs">
          <button data-tab="overview" class="active">Overview</button>
          <button data-tab="phases">Phases</button>
          <button data-tab="tasks">Tasks</button>
          <button data-tab="dispatches">Dispatches</button>
          <button data-tab="runtime-runs">Runtime</button>
          <button data-tab="agent-runs">Agent Runs</button>
          <button data-tab="verification">Verification</button>
          <button data-tab="message-flows">Message Flow</button>
          <button data-tab="timeline">Timeline</button>
          <button data-tab="incident-closeout">Incidents</button>
          <button data-tab="human-gates">Human Gate</button>
          <button data-tab="human-gate-readiness">Gate Readiness</button>
          <button data-tab="outbox">Outbox</button>
          <button data-tab="operations">Operations</button>
          <button data-tab="evidence">Evidence</button>
          <button data-tab="receipts">Receipts</button>
          <button data-tab="evidence-desk">Evidence Desk</button>
          <button data-tab="evidence-pack">Export</button>
          <button data-tab="raw">Raw</button>
        </div>
        <section id="detailBody" class="detail-body"></section>
      </section>
    </main>
    <div id="drawerRoot"></div>
    <div id="paletteRoot"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
