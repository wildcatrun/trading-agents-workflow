<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trading Agents Workflow Console</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Workflow Console</h1>
        <p id="configLine">Loading...</p>
      </div>
      <nav>
        <button data-view="active">Active</button>
        <button data-view="waiting_human">Human Gate</button>
        <button data-view="blocked">Blocked</button>
        <button data-view="paused">Paused</button>
      </nav>
    </header>
    <main class="layout">
      <section class="panel workflows">
        <div class="panel-head">
          <h2>Workflows</h2>
          <button id="refreshButton">Refresh</button>
        </div>
        <div id="workflowList" class="list"></div>
      </section>
      <section class="panel detail">
        <div class="panel-head">
          <h2 id="detailTitle">Select a workflow</h2>
          <button id="previewButton" disabled>Preview Supervise</button>
        </div>
        <div class="tabs">
          <button data-tab="overview" class="active">Overview</button>
          <button data-tab="tasks">Tasks</button>
          <button data-tab="dispatches">Dispatches</button>
          <button data-tab="human-gates">Human Gate</button>
          <button data-tab="operations">Operations</button>
        </div>
        <pre id="detailBody" class="json"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
